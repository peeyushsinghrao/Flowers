<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grow &amp; Bloom</title>
<style>
  :root{
    --ink:#e9e4d8;
    --dim:#8a8578;
    --accent:#ff5d73;
    --accent2:#7cf29c;
    --panel:rgba(10,10,10,0.55);
    --border:rgba(255,255,255,0.12);
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;height:100%;background:#000;
    font-family:'Courier New',ui-monospace,monospace;
    color:var(--ink);
    overflow:hidden;
  }
  #stage{
    position:relative;
    width:100vw;height:100vh;
    display:flex;align-items:center;justify-content:center;
    background:#000;
  }
  video{
    position:absolute;
    top:0;left:0;width:100%;height:100%;
    object-fit:cover;
    transform:scaleX(-1);
    filter:brightness(0.8) saturate(1.05);
  }
  canvas{
    position:absolute;
    top:0;left:0;width:100%;height:100%;
    pointer-events:none;
  }

  /* top HUD */
  .hud-top{
    position:absolute; top:18px; left:18px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:10px;
    padding:10px 14px;
    font-size:12px;
    letter-spacing:0.5px;
    backdrop-filter:blur(6px);
    z-index:5;
    min-width:150px;
  }
  .hud-top .row{display:flex;justify-content:space-between;margin:2px 0;color:var(--dim);}
  .hud-top .row span:last-child{color:var(--ink);font-weight:bold;}
  .hud-title{
    font-weight:bold; color:var(--ink); margin-bottom:6px;
    letter-spacing:1px; font-size:11px; text-transform:uppercase; opacity:0.8;
  }

  .badge{
    position:absolute;
    background:rgba(0,0,0,0.55);
    border:1px solid var(--border);
    border-radius:6px;
    padding:3px 9px;
    font-size:10px;
    letter-spacing:1px;
    text-transform:uppercase;
    z-index:5;
    color:var(--accent2);
  }

  .caption{
    position:absolute;
    bottom:26px; left:50%; transform:translateX(-50%);
    background:rgba(0,0,0,0.55);
    border:1px solid var(--border);
    border-radius:8px;
    padding:8px 18px;
    font-size:13px;
    text-align:center;
    z-index:5;
    max-width:90%;
    backdrop-filter:blur(6px);
  }
  .caption b{color:var(--accent2);}
  .caption b.right{color:var(--accent);}

  /* settings gear */
  #gearBtn{
    position:absolute; top:18px; right:18px;
    width:38px; height:38px;
    border-radius:50%;
    background:var(--panel);
    border:1px solid var(--border);
    color:var(--ink);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    font-size:18px;
    z-index:10;
    backdrop-filter:blur(6px);
    transition:transform 0.3s ease, background 0.2s;
    user-select:none;
  }
  #gearBtn:hover{background:rgba(30,30,30,0.7);}
  #gearBtn.spin{transform:rotate(90deg);}

  #settingsPanel{
    position:absolute; top:64px; right:18px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:10px;
    padding:14px;
    width:230px;
    font-size:12px;
    z-index:10;
    backdrop-filter:blur(8px);
    display:none;
    flex-direction:column;
    gap:10px;
  }
  #settingsPanel.open{display:flex;}
  #settingsPanel label{
    text-transform:uppercase; letter-spacing:1px; color:var(--dim); font-size:10px;
  }
  #cameraSelect{
    width:100%;
    background:#111;
    color:var(--ink);
    border:1px solid var(--border);
    border-radius:6px;
    padding:6px 8px;
    font-family:inherit;
    font-size:12px;
  }
  .settings-row{display:flex; flex-direction:column; gap:5px;}
  .toggle-row{
    display:flex; align-items:center; justify-content:space-between;
  }
  .switch{
    position:relative; width:36px; height:20px;
    background:#333; border-radius:20px; cursor:pointer;
    border:1px solid var(--border);
  }
  .switch.on{background:var(--accent2);}
  .switch::after{
    content:''; position:absolute; top:2px; left:2px;
    width:14px; height:14px; border-radius:50%;
    background:#fff; transition:left 0.2s;
  }
  .switch.on::after{left:18px;}

  #loading{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:10px;
    background:#000; z-index:20;
    font-size:13px; letter-spacing:1px; color:var(--dim);
  }
  #loading .spinner{
    width:26px;height:26px;border-radius:50%;
    border:2px solid var(--border);
    border-top-color:var(--accent2);
    animation:spin 0.9s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  #errorBox{
    position:absolute; inset:0; z-index:25;
    display:none; align-items:center; justify-content:center;
    background:rgba(0,0,0,0.9); text-align:center; padding:30px;
  }
  #errorBox p{max-width:420px; color:var(--dim); font-size:13px; line-height:1.6;}
  #errorBox b{color:var(--accent);}
</style>
</head>
<body>

<div id="stage">
  <video id="video" playsinline autoplay muted></video>
  <canvas id="overlay"></canvas>

  <div class="hud-top">
    <div class="hud-title">Grow &amp; Bloom</div>
    <div class="row"><span>Grow</span><span id="growVal">0.00</span></div>
    <div class="row"><span>Bloom</span><span id="bloomVal">0.00</span></div>
    <div class="row"><span>Scale</span><span id="scaleVal">1.00</span></div>
  </div>

  <div class="badge" id="leftBadge" style="display:none;">Left Hand</div>
  <div class="badge" id="rightBadge" style="display:none;">Right Hand</div>

  <div class="caption">
    <b class="right">RIGHT HAND</b> grows the stem &nbsp;•&nbsp; <b>LEFT HAND</b> opens the bloom
  </div>

  <div id="gearBtn" title="Settings">⚙</div>
  <div id="settingsPanel">
    <div class="settings-row">
      <label for="cameraSelect">Camera</label>
      <select id="cameraSelect"></select>
    </div>
    <div class="toggle-row">
      <label style="text-transform:none;letter-spacing:0;color:var(--ink);font-size:12px;">Mirror preview</label>
      <div class="switch on" id="mirrorToggle"></div>
    </div>
    <div class="toggle-row">
      <label style="text-transform:none;letter-spacing:0;color:var(--ink);font-size:12px;">Show hand skeleton</label>
      <div class="switch on" id="skeletonToggle"></div>
    </div>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <div>Starting camera &amp; hand tracking…</div>
  </div>

  <div id="errorBox">
    <p><b id="errTitle">Camera access needed.</b><br><span id="errDetail">This app needs your webcam and a MediaPipe-capable browser (Chrome/Edge recommended).</span></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script>
(function(){
  const video = document.getElementById('video');
  const canvas = document.getElementById('overlay');
  const ctx = canvas.getContext('2d');
  const loading = document.getElementById('loading');
  const errorBox = document.getElementById('errorBox');
  const errTitle = document.getElementById('errTitle');
  const errDetail = document.getElementById('errDetail');

  function showError(err){
    loading.style.display = 'none';
    errorBox.style.display = 'flex';

    const isFileProtocol = location.protocol === 'file:';
    const isInsecure = location.protocol === 'http:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1';

    if (isFileProtocol){
      errTitle.textContent = "Can't access camera from a local file.";
      errDetail.innerHTML = 'Browsers block camera access when a page is opened directly (file://). Serve this file over localhost instead, e.g. run <code>python3 -m http.server</code> in the folder and open <code>http://localhost:8000</code>, then reload.';
    } else if (isInsecure){
      errTitle.textContent = "Camera needs a secure connection.";
      errDetail.textContent = 'Camera access requires HTTPS (or localhost). Serve this page over https:// and reload.';
    } else if (err && err.name === 'NotAllowedError'){
      errTitle.textContent = 'Camera permission was denied.';
      errDetail.textContent = "Check your browser's site settings (click the camera icon in the address bar) to allow camera access, then reload.";
    } else if (err && err.name === 'NotFoundError'){
      errTitle.textContent = 'No camera found.';
      errDetail.textContent = 'No webcam was detected on this device. Connect a camera and reload.';
    } else if (err && err.name === 'NotReadableError'){
      errTitle.textContent = 'Camera is in use by another app.';
      errDetail.textContent = 'Close other apps or tabs using your webcam (Zoom, another browser tab, etc.) and reload.';
    } else {
      errTitle.textContent = 'Something went wrong starting the camera or tracking model.';
      errDetail.textContent = (err && (err.message || err.name)) || 'Unknown error — check the browser console for details.';
    }
  }
  const growVal = document.getElementById('growVal');
  const bloomVal = document.getElementById('bloomVal');
  const scaleVal = document.getElementById('scaleVal');
  const leftBadge = document.getElementById('leftBadge');
  const rightBadge = document.getElementById('rightBadge');

  const gearBtn = document.getElementById('gearBtn');
  const settingsPanel = document.getElementById('settingsPanel');
  const cameraSelect = document.getElementById('cameraSelect');
  const mirrorToggle = document.getElementById('mirrorToggle');
  const skeletonToggle = document.getElementById('skeletonToggle');

  let mirrored = true;
  let showSkeleton = true;
  let currentStream = null;
  let currentDeviceId = null;
  let rafId = null;
  let handsReady = false;
  let processing = false;

  // Smoothed animation state
  let grow = 0;     // 0..1 stem growth
  let bloom = 0;     // 0..1 flower opening
  let scale = 1;      // overall pulsing scale for glow

  let targetGrow = 0;
  let targetBloom = 0;

  function resizeCanvas(){
    canvas.width = canvas.clientWidth * devicePixelRatio;
    canvas.height = canvas.clientHeight * devicePixelRatio;
  }
  window.addEventListener('resize', resizeCanvas);

  // ---------- Settings UI ----------
  gearBtn.addEventListener('click', () => {
    settingsPanel.classList.toggle('open');
    gearBtn.classList.toggle('spin', settingsPanel.classList.contains('open'));
  });

  mirrorToggle.addEventListener('click', () => {
    mirrored = !mirrored;
    mirrorToggle.classList.toggle('on', mirrored);
    video.style.transform = mirrored ? 'scaleX(-1)' : 'scaleX(1)';
  });

  skeletonToggle.addEventListener('click', () => {
    showSkeleton = !showSkeleton;
    skeletonToggle.classList.toggle('on', showSkeleton);
  });

  async function listCameras(){
    const devices = await navigator.mediaDevices.enumerateDevices();
    const cams = devices.filter(d => d.kind === 'videoinput');
    cameraSelect.innerHTML = '';
    cams.forEach((cam, i) => {
      const opt = document.createElement('option');
      opt.value = cam.deviceId;
      opt.textContent = cam.label || `Camera ${i+1}`;
      cameraSelect.appendChild(opt);
    });
    if (cams.length && !currentDeviceId){
      currentDeviceId = cams[0].deviceId;
    }
  }

  cameraSelect.addEventListener('change', async () => {
    currentDeviceId = cameraSelect.value;
    try {
      await startCamera(currentDeviceId);
    } catch(e){
      showError(e);
    }
  });

  async function startCamera(deviceId){
    if (currentStream){
      currentStream.getTracks().forEach(t => t.stop());
    }
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      const err = new Error('getUserMedia unavailable (insecure context or unsupported browser)');
      err.name = 'NotSupportedError';
      throw err;
    }
    const constraints = {
      video: deviceId ? { deviceId: { exact: deviceId } } : { facingMode: 'user' },
      audio: false
    };
    const stream = await navigator.mediaDevices.getUserMedia(constraints);
    currentStream = stream;
    video.srcObject = stream;
    await video.play();
    await listCameras();
    if (deviceId) cameraSelect.value = deviceId;
    resizeCanvas();
    return true;
  }

  // ---------- Hand tracking ----------
  const hands = new Hands({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
  });
  hands.setOptions({
    maxNumHands: 2,
    modelComplexity: 1,
    minDetectionConfidence: 0.6,
    minTrackingConfidence: 0.6
  });

  hands.onResults(onResults);

  function dist(a,b){
    return Math.hypot(a.x-b.x, a.y-b.y, (a.z||0)-(b.z||0));
  }

  function onResults(results){
    resizeCanvas();
    ctx.clearRect(0,0,canvas.width, canvas.height);

    let leftHand = null, rightHand = null;

    if (results.multiHandLandmarks && results.multiHandedness){
      results.multiHandLandmarks.forEach((lm, i) => {
        const handedness = results.multiHandedness[i].label; // 'Left' or 'Right' (as seen by camera, mirrored)
        // Because video is mirrored visually but landmarks come from raw (unmirrored) frame,
        // MediaPipe's "Left"/"Right" refers to the actual hand in frame (not mirrored).
        // When displayed mirrored, the person's right hand appears on screen where MediaPipe says "Left".
        // We want: person's real right hand = grows stem, real left hand = blooms.
        if (handedness === 'Left'){
          rightHand = lm; // MediaPipe "Left" in raw frame = person's actual right hand when mirrored
        } else {
          leftHand = lm;
        }
      });
    }

    leftBadge.style.display = leftHand ? 'block' : 'none';
    rightBadge.style.display = rightHand ? 'block' : 'none';

    // position badges roughly over hands (mirrored coords -> screen coords)
    if (rightHand){
      const wrist = rightHand[0];
      const x = mirrored ? (1-wrist.x) : wrist.x;
      rightBadge.style.left = (x*canvas.clientWidth - 40) + 'px';
      rightBadge.style.top = (wrist.y*canvas.clientHeight - 40) + 'px';
    }
    if (leftHand){
      const wrist = leftHand[0];
      const x = mirrored ? (1-wrist.x) : wrist.x;
      leftBadge.style.left = (x*canvas.clientWidth - 40) + 'px';
      leftBadge.style.top = (wrist.y*canvas.clientHeight - 40) + 'px';
    }

    // Right hand: openness (fingers spread from wrist) controls GROW
    if (rightHand){
      const wrist = rightHand[0];
      const tips = [8,12,16,20].map(i => rightHand[i]);
      const avgDist = tips.reduce((s,t) => s + dist(t, wrist), 0) / tips.length;
      // normalize roughly: closed fist ~0.15, open hand ~0.35
      targetGrow = clamp((avgDist - 0.12) / (0.30 - 0.12), 0, 1);
    }

    // Left hand: spread between thumb and fingers controls BLOOM
    if (leftHand){
      const thumb = leftHand[4];
      const pinky = leftHand[20];
      const wrist = leftHand[0];
      const spread = dist(thumb, pinky);
      targetBloom = clamp((spread - 0.05) / (0.28 - 0.05), 0, 1);
    }

    // draw skeleton if enabled
    if (showSkeleton && results.multiHandLandmarks){
      results.multiHandLandmarks.forEach(lm => drawSkeleton(lm));
    }

    // smooth values
    grow += (targetGrow - grow) * 0.15;
    bloom += (targetBloom - bloom) * 0.15;
    scale = 1 + Math.sin(Date.now()/500) * 0.02 * bloom;

    growVal.textContent = grow.toFixed(2);
    bloomVal.textContent = bloom.toFixed(2);
    scaleVal.textContent = scale.toFixed(2);

    drawFlower(grow, bloom, scale);
  }

  function clamp(v, lo, hi){ return Math.max(lo, Math.min(hi, v)); }

  const HAND_CONNECTIONS = [
    [0,1],[1,2],[2,3],[3,4],
    [0,5],[5,6],[6,7],[7,8],
    [5,9],[9,10],[10,11],[11,12],
    [9,13],[13,14],[14,15],[15,16],
    [13,17],[17,18],[18,19],[19,20],
    [0,17]
  ];

  function toScreen(pt){
    const x = mirrored ? (1-pt.x) : pt.x;
    return { x: x*canvas.width, y: pt.y*canvas.height };
  }

  function drawSkeleton(lm){
    ctx.save();
    ctx.strokeStyle = 'rgba(124,242,156,0.55)';
    ctx.lineWidth = 2*devicePixelRatio;
    HAND_CONNECTIONS.forEach(([a,b]) => {
      const p1 = toScreen(lm[a]);
      const p2 = toScreen(lm[b]);
      ctx.beginPath();
      ctx.moveTo(p1.x, p1.y);
      ctx.lineTo(p2.x, p2.y);
      ctx.stroke();
    });
    lm.forEach(pt => {
      const p = toScreen(pt);
      ctx.beginPath();
      ctx.arc(p.x, p.y, 3*devicePixelRatio, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,93,115,0.85)';
      ctx.fill();
    });
    ctx.restore();
  }

  // ---------- Flower drawing ----------
  function drawFlower(grow, bloom, scale){
    const w = canvas.width, h = canvas.height;
    const baseX = w * 0.5;
    const baseY = h * 0.92;
    const maxStemLen = h * 0.5;
    const stemLen = maxStemLen * grow;
    const topX = baseX;
    const topY = baseY - stemLen;

    ctx.save();
    ctx.translate(0,0);

    // glow behind everything (bloom driven)
    if (grow > 0.02){
      const glowRadius = (60 + bloom*140) * scale * devicePixelRatio;
      const grad = ctx.createRadialGradient(topX, topY, 0, topX, topY, glowRadius);
      grad.addColorStop(0, `rgba(255,120,150,${0.55*Math.max(grow,bloom)})`);
      grad.addColorStop(0.5, `rgba(255,93,115,${0.25*Math.max(grow,bloom)})`);
      grad.addColorStop(1, 'rgba(255,93,115,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(topX, topY, glowRadius, 0, Math.PI*2);
      ctx.fill();
    }

    // stem (curved slightly for organic feel)
    if (grow > 0.01){
      ctx.strokeStyle = `rgba(124,242,156,0.95)`;
      ctx.lineWidth = 5*devicePixelRatio;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(baseX, baseY);
      const midX = baseX + Math.sin(Date.now()/900)*8*devicePixelRatio*grow;
      ctx.quadraticCurveTo(midX, baseY - stemLen*0.5, topX, topY);
      ctx.stroke();

      // little leaves
      if (grow > 0.35){
        drawLeaf(baseX - 4*devicePixelRatio, baseY - stemLen*0.35, -1, grow);
        drawLeaf(baseX + 4*devicePixelRatio, baseY - stemLen*0.6, 1, grow);
      }
    }

    // flower head
    if (grow > 0.15){
      const petalCount = 6;
      const petalLen = (14 + bloom*34) * scale * devicePixelRatio;
      const petalWidth = (8 + bloom*16) * devicePixelRatio;
      const openAngle = bloom; // 0 = closed bud, 1 = fully open

      ctx.save();
      ctx.translate(topX, topY);

      for (let i=0;i<petalCount;i++){
        const angle = (i / petalCount) * Math.PI*2;
        const spreadDist = petalLen * (0.3 + 0.7*openAngle);
        const px = Math.cos(angle) * spreadDist * (0.4+0.6*openAngle);
        const py = Math.sin(angle) * spreadDist * (0.4+0.6*openAngle) * 0.6 - petalLen*0.15;

        ctx.save();
        ctx.translate(px, py);
        ctx.rotate(angle + Math.PI/2);
        const grad = ctx.createLinearGradient(0,-petalLen/2,0,petalLen/2);
        grad.addColorStop(0, 'rgba(255,196,210,0.95)');
        grad.addColorStop(1, `rgba(255,93,115,${0.85})`);
        ctx.fillStyle = grad;
        ctx.shadowColor = 'rgba(255,93,115,0.8)';
        ctx.shadowBlur = 12*devicePixelRatio*openAngle;
        ctx.beginPath();
        ctx.ellipse(0,0, petalWidth*(0.4+0.6*openAngle), petalLen*(0.5+0.5*openAngle), 0, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
      }

      // center
      const centerR = (6 + bloom*6) * devicePixelRatio;
      const cgrad = ctx.createRadialGradient(0,0,0,0,0,centerR);
      cgrad.addColorStop(0, 'rgba(255,235,150,1)');
      cgrad.addColorStop(1, 'rgba(255,180,60,0.9)');
      ctx.fillStyle = cgrad;
      ctx.shadowColor = 'rgba(255,220,120,0.9)';
      ctx.shadowBlur = 16*devicePixelRatio*bloom;
      ctx.beginPath();
      ctx.arc(0,0,centerR,0,Math.PI*2);
      ctx.fill();

      ctx.restore();
    } else if (grow > 0.01){
      // bud
      ctx.save();
      ctx.translate(topX, topY);
      ctx.fillStyle = 'rgba(255,140,160,0.9)';
      ctx.beginPath();
      ctx.ellipse(0,0, 6*devicePixelRatio, 10*devicePixelRatio, 0,0,Math.PI*2);
      ctx.fill();
      ctx.restore();
    }

    ctx.restore();
  }

  function drawLeaf(x, y, dir, grow){
    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(dir * 0.6);
    ctx.fillStyle = 'rgba(124,242,156,0.85)';
    ctx.beginPath();
    ctx.ellipse(0,0, 16*devicePixelRatio*grow, 7*devicePixelRatio*grow, 0,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  // ---------- Manual frame loop (avoids double getUserMedia calls) ----------
  async function frameLoop(){
    if (video.readyState >= 2 && handsReady && !processing){
      processing = true;
      try {
        await hands.send({image: video});
      } catch(e){
        console.error('hands.send failed', e);
      }
      processing = false;
    }
    rafId = requestAnimationFrame(frameLoop);
  }

  // ---------- Bootstrap ----------
  async function init(){
    // Give the Hands wasm/model a moment; also acts as our readiness gate.
    const readyTimeout = setTimeout(() => {
      if (!handsReady){
        showError(new Error('Timed out loading the hand-tracking model (check your network settings).'));
      }
    }, 20000);

    try {
      await startCamera(null);

      await hands.initialize();
      handsReady = true;
      clearTimeout(readyTimeout);

      loading.style.display = 'none';
      frameLoop();
    } catch(e){
      console.error(e);
      clearTimeout(readyTimeout);
      showError(e);
    }
  }

  init();
})();
</script>
</body>
</html>
